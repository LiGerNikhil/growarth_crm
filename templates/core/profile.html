{% extends "base/layout.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="row">
  <div class="col-xl-4">
    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex align-items-center mb-3">
          <div class="avatar avatar-xl">
            <div class="w-px-100 h-auto rounded-circle bg-primary d-flex align-items-center justify-content-center">
              <i class="bx bx-user text-white fs-2"></i>
            </div>
          </div>
          <div class="ms-3">
            <h5 class="mb-0">Admin User</h5>
            <p class="text-muted">admin@crm.com</p>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary btn-sm">Edit Profile</button>
          <button class="btn btn-outline-secondary btn-sm">Change Password</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="col-xl-8">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0">Profile Information</h5>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" value="Admin">
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" value="User">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="admin@crm.com">
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" value="+1 234-567-8900">
          </div>
          <div class="col-12">
            <label class="form-label">Bio</label>
            <textarea class="form-control" rows="3">System Administrator</textarea>
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
